name: Docker Build and Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      aws_environment:
        description: "Choose Environment"
        type: choice
        options: ['dev', 'stage', 'prod']
        default: 'dev'
        required: true
      instance_count:
        description: 'Number of EC2 instances (1-2)'
        type: choice
        options: ['1', '2']
        default: '1'
        required: true

  push:
    branches:
      - Deploy

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  SetupEnvVars:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.aws_environment || 'dev' }}
    outputs:
      account_num: ${{ steps.account_num_step.outputs.account_num }}
    steps:
      - name: Set Account Number
        id: account_num_step
        run: echo "account_num=${{ vars.ACCOUNT_NUM }}" >> "$GITHUB_OUTPUT"

  get-run-id:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.get-run.outputs.run_id }}

    steps:
      - name: Get latest workflow run ID
        id: get-run
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs \
            | jq '[.workflow_runs[]
                  | select(.name=="Run Docker Pipeline" and .conclusion=="success")]
                  | sort_by(.created_at)
                  | reverse
                  | .[0].id')

          echo "Latest run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

  get-build-run-number:
    runs-on: ubuntu-latest
    outputs:
      build_run_number: ${{ steps.read.outputs.build_run_number }}
  
    steps:
      - name: Get latest successful main workflow run ID
        id: get-run
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?branch=main" \
            | jq '[.workflow_runs[]
                  | select(.name=="Run Docker Pipeline" and .conclusion=="success")]
                  | sort_by(.created_at)
                  | reverse
                  | .[0].id')
  
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
  
      - name: Download build run number artifact
        uses: actions/download-artifact@v4
        with:
          name: latest-build-run-number
          run-id: ${{ steps.get-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Read build run number
        id: read
        run: |
          BUILD_RUN_NUMBER=$(cat build_run_number.txt)
          echo "build_run_number=$BUILD_RUN_NUMBER" >> "$GITHUB_OUTPUT"
  synthApp:
    needs:
      - SetupEnvVars
      - get-run-id
      - get-build-run-number
  
    uses: Ggowthampatnaik/streamlit-ecr-deploy/.github/workflows/cdkSynth.yml@v11.1.1
  
    with:
      environment: ${{ github.event.inputs.aws_environment || 'dev' }}
  
      AWSRegion: us-east-1
      AWSRoleToAssume: arn:aws:iam::${{ needs.SetupEnvVars.outputs.account_num }}:role/github-ecr-role
      AWSRoleSessionName: gha-cdk-synth
      AWSRoleDurationSeconds: 900
      AWSMaskAccountId: false
  
      workingDirectory: ./app
  
      outputArtifactUploadName: ${{ github.event.inputs.aws_environment || 'dev' }}-infra
      outputArtifactRetention: 5
  
      installCommand: |
        pip install -r requirements.txt
  
      allowDelicateChanges: true
  
      synthArgs: -c env=${{ github.event.inputs.aws_environment || 'dev' }} -c instanceCount=${{ github.event.inputs.instance_count || '1' }} -c imageUri=${{ needs.SetupEnvVars.outputs.account_num }}.dkr.ecr.us-east-1.amazonaws.com/streamlit-ecr-deploy:${{ needs.get-build-run-number.outputs.build_run_number }}
   
    secrets:
      githubToken: ${{ secrets.GITHUB_TOKEN }}
      orcaSecurityApiToken: ${{ secrets.ORCA_TOKEN }}  

  deployApp:
    needs:
      - SetupEnvVars
      - get-run-id
      - get-build-run-number
      - synthApp

    uses: Ggowthampatnaik/streamlit-ecr-deploy/.github/workflows/cdkDeploy.yml@v11.1.1
    with:
      environment: ${{ github.event.inputs.aws_environment || 'dev' }}

      AWSRegion: us-east-1
      AWSRoleToAssume: arn:aws:iam::${{ needs.SetupEnvVars.outputs.account_num }}:role/github-ecr-role
      AWSRoleSessionName: gha-cdk-deploy
      AWSRoleDurationSeconds: 900
      AWSMaskAccountId: false
      stackName: StreamlitEcsStack
      inputArtifactDownloadName: ${{ github.event.inputs.aws_environment || 'dev' }}-infra

      deployArgs: -c env=${{ github.event.inputs.aws_environment || 'dev' }} -c instanceCount=${{ github.event.inputs.instance_count || '1' }} -c imageUri=${{ needs.SetupEnvVars.outputs.account_num }}.dkr.ecr.us-east-1.amazonaws.com/streamlit-ecr-deploy:${{ needs.get-build-run-number.outputs.build_run_number }}
    secrets: inherit
