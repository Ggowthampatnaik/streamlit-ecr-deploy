name: Run Docker Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    uses: ./.github/workflows/docker-build.yml
    with:
      AWSRoleToAssume: arn:aws:iam::<YOUR_ACCOUNT_ID>:role/github-ecr-role
      ECRRepository: my-app
      dockerImageName: my-app
      createECR: true
      ecrPolicyFile: policy.json
    secrets:
      orcaSecurityApiToken: ${{ secrets.ORCA_TOKEN }}
