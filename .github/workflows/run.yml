name: Docker Build and Deploy to ECS

on:
  workflow_dispatch:
    inputs:
      aws_environment:
        description: "Choose Environment"
        type: choice
        options: ['dev', 'stage', 'prod']
        default: 'dev'
        required: true
      instance_count:
        description: 'Number of EC2 instances (1-2)'
        type: choice
        options: ['1', '2']
        default: '1'
        required: true

  push:
    branches:
      - test

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  SetupEnvVars:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.aws_environment || 'dev' }}
    outputs:
      account_num: ${{ steps.account_num_step.outputs.account_num }}
    steps:
      - name: Set Account Number
        id: account_num_step
        run: echo "account_num=${{ vars.ACCOUNT_NUM }}" >> "$GITHUB_OUTPUT"

  get-run-id:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.get-run.outputs.run_id }}

    steps:
      - name: Get latest workflow run ID
        id: get-run
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs \
            | jq '[.workflow_runs[]
                  | select(.name=="Run Docker Pipeline" and .conclusion=="success")]
                  | sort_by(.created_at)
                  | reverse
                  | .[0].id')

          echo "Latest run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

  dockerBuild:
    needs: 
    - SetupEnvVars
    - get-run-id
    uses: Ggowthampatnaik/streamlit-ecr-deploy/.github/workflows/docker-build.yml@main
    with:
      AWSRoleToAssume: arn:aws:iam::493272324412:role/github-ecr-role
      AWSRegion: us-east-1
  
      ECRRepository: streamlit-ecr-deploy
      dockerImageName: ${{ needs.SetupEnvVars.outputs.account_num }}.dkr.ecr.us-east-1.amazonaws.com/streamlit-ecr-deploy:${{ github.run_number }}
  
      createECR: true
      ecrPolicyFile: policy.json
  
      preBuildCommand: |
        git fetch origin main
        git checkout origin/main -- app
  
      buildCommand: docker build -f ./app/Dockerfile -t $IMAGE_NAME ./app
  
      outputArtifactUploadName: scan_results
      outputArtifactPath: scan_results/
      outputArtifactRetention: 5
      inputArtifactDownloadName: scan_results

      run_id: ${{ needs.get-run-id.outputs.run_id }}
  
    secrets:
      orcaSecurityApiToken: ${{ secrets.ORCA_TOKEN }}
  
  save-build-run-number:
    runs-on: ubuntu-latest
    needs: 
      - SetupEnvVars
      - get-run-id
      - dockerBuild
  
    steps:
      - name: Save build run number
        run: |
          echo "${{ github.run_number }}" > build_run_number.txt
  
      - name: Upload build run number artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-build-run-number
          path: build_run_number.txt
          retention-days: 5
