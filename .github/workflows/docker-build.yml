name: Docker Build, Scan, Push (Full Pipeline)

on:
  workflow_call:
    inputs:
      environment:
        description: Which GH environment to use
        type: string
        required: false
      runsOn:
        default: ubuntu-latest
        description: Platform to execute on
        type: string
        required: false
      workingDirectory:
        type: string
        default: "./"
        description: "specify starting directory"
        required: false
      
      branch:
        type: string
        description: "branch/ref of repository to use"
        default: ""
        required: false
        
       # AWS configuration
      AWSRoleToAssume:
        description: AWS role ARN to assume. Should have a corresponding trust policy
        type: string
        required: false
      AWSRegion:
        default: us-east-2
        description: Which region to use in AWS. Signet standard is us-east-2
        type: string
        required: false
      AWSRoleDurationSeconds:
        description: How long the assumed role session lasts (in seconds)
        type: string
        default: "900"
      AWSRoleSessionName:
        default: github-action-assumed-role
        description: A "role session friendly name" to make deciphering logs easier
        type: string
      AWSMaskAccountId:
        default: true
        description: Whether to mask or not mask the AWS Account ID
        type: boolean
        
       # Input artifacts
      inputArtifactPath:
        type: string
        description: Where to store the downloaded artifact
        default: "./artifact"

      inputArtifactDownloadName:
        type: string
        required: false
        
       # output artifacts
      outputArtifactPath:
        type: string
        description: The path to the artifact to be uploaded. This is relative to github runner home, NOT the working directory
        default: "scan_results/"

      outputArtifactUploadName:
        type: string
        description: The name of the artifact to upload. Defaults to the name of the job using this
        default: "scan_results"

      outputArtifactRetention:
        type: string
        description: How long in days to keep the github action artifact
        default: "5"

      # ECR
      ECRRepository:
        description: Name of registry in AWS ECR
        type: string
        required: false

      createECR:
        description: Create ECR repo if it does not exist.
        type: boolean
        required: false
        default: false

      ecrPolicyFile:
        description: The policy used when creating the ECR repo
        type: string
        required: false

      dockerImageName:
        description: The arn name of the image to be built

        type: string
        required: false

      # Commands
      installCommand:
        description: Command to install dependencies
        type: string
        required: false
        
      preBuildCommand:
        type: string
        required: false

      buildCommand:
        type: string
        required: false

      postBuildCommand:
        type: string
        required: false

      run_id:
        type: string
        default: ""

    secrets:
      orcaSecurityApiToken:
        description: "Orca Security API Token"
        required: true
      orcaProjectKey:
        description: "DEPRECATED! Will now be auto-configured if not specified. Orca Security Project Key, looks like '<Github-Org>-<Repo-Name>'"
        required: false
    
    outputs:
      imageARN:
        description: "ARN of the image pushed to ECR"
        value: ${{ jobs.build.outputs.imageARN }}
      hash:
        description: "The hash of the policy.json if exists."
        value: ${{ jobs.build.outputs.hash }}

permissions:
  id-token: write
  contents: read
  actions: read

env:
 GH_RUN_NUM: ${{ github.run_number }}
 ENVIRONMENT: ${{ inputs.environment }}
 ECR_REPOSITORY: ${{ inputs.ECRRepository }}
 ORCA_PROJECT_KEY: ${{ secrets.orcaProjectKey }}


jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      imageARN: ${{ steps.imageName.outputs.imageARN }}
      hash: ${{ steps.hash-policy.outputs.hash }}

    steps:

    # 🔹 Checkout
    - name: Checkout
      uses: actions/checkout@v4


    # 🔹 OIDC Auth
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.AWSRoleToAssume }}
        aws-region: ${{ inputs.AWSRegion }}
        role-duration-seconds: 900


    - name: Show credential expiration
      run: |
        echo "Checking expiration..."
        aws sts get-caller-identity
        env | grep AWS

    - name: Check expiration via STS
      run: |
        aws sts get-caller-identity

    # 🔹 Login to ECR
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 🔹 Set Image URI
    - name: Set image name
      id: imageName
      run: |
       echo "IMAGE_NAME=${{ inputs.dockerImageName }}" >> $GITHUB_ENV
       echo "imageARN=${{ inputs.dockerImageName }}" >> $GITHUB_OUTPUT


    # 🔹 Install jq
    - name: Install jq
      run: sudo apt-get install -y jq


    # 🔹 Hash policy file
    - name: Hash policy.json
      if: ${{ inputs.ecrPolicyFile }}
      id: hash-policy
      run: |
        hash=$(sha512sum "${{ inputs.ecrPolicyFile }}" | cut -d ' ' -f 1)
        key="${{ inputs.ECRRepository }}-$hash"
        echo "hash=$key" >> $GITHUB_OUTPUT

    - name: Prepare cache directory
      if: ${{ inputs.ecrPolicyFile }}
      run: mkdir -p policyhash
  
    # 🔹 Cache policy hash
    - name: Cache policy
      if: ${{ inputs.ecrPolicyFile }}
      id: cache-policy
      uses: actions/cache@v4
      with:
        path: policyhash
        key: ${{ steps.hash-policy.outputs.hash }}

    # 🔹 Create ECR repo
    - name: Create ECR Repo
      if: ${{ inputs.createECR }}
      run: |
        set +e
        aws ecr describe-repositories --repository-names "${{ inputs.ECRRepository }}" >/dev/null 2>&1
        if [ $? -ne 0 ]; then
          echo "Creating repository..."
          aws ecr create-repository --repository-name "${{ inputs.ECRRepository }}"

          if [ -f "${{ inputs.ecrPolicyFile }}" ]; then
            echo "Applying policy..."
            aws ecr set-repository-policy \
              --repository-name "${{ inputs.ECRRepository }}" \
              --policy-text file://"${{ inputs.ecrPolicyFile }}"
          fi
        else
          echo "Repository exists"
        fi
        set -e

    # 🔹 Update policy if changed
    - name: Update ECR Policy if changed
      if: ${{ inputs.ecrPolicyFile && steps.cache-policy.outputs.cache-hit != 'true' }}
      run: |
        echo "Updating policy..."
        aws ecr set-repository-policy \
          --repository-name "${{ inputs.ECRRepository }}" \
          --policy-text file://"${{ inputs.ecrPolicyFile }}"
       

    # 🔹 PreBuild Command
    - name: Pre Build
      if: ${{ inputs.preBuildCommand }}
      run: ${{ inputs.preBuildCommand }}

        # 🔹 Build Step
    - name: Build Image
      run: |
        if [ -n "${{ inputs.buildCommand }}" ]; then
          echo "$IMAGE_NAME"
          echo "Running custom build command"
          ${{ inputs.buildCommand }}
        else
          docker build -t ${{ inputs.dockerImageName }} .
        fi

      #scan Image
    - name: Validate Image (Custom Function)
      run: |
         python validate_image.py "${{ inputs.dockerImageName }}" > validation_report.json

    # 🔹 PostBuild Command / Push
    - name: Post Build
      run: |
        if [ -n "${{ inputs.postBuildCommand }}" ]; then
          echo "Running custom post build"
          ${{ inputs.postBuildCommand }}
        else
          docker push ${{ inputs.dockerImageName }}
        fi

