name: Run Docker Pipeline

on:
  push:
    branches: ["test"]

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  get-run-id:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.get-run.outputs.run_id }}

    steps:


      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Bring test.py from main
        run: |
          git fetch origin main
          git checkout origin/main -- app/test.py
          
      - name: Get latest workflow run ID
        id: get-run
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/runs \
            | jq '[.workflow_runs[]
                  | select(.name=="Run Docker Pipeline" and .conclusion=="success")]
                  | sort_by(.created_at)
                  | reverse
                  | .[0].id')

          echo "Latest run ID: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

  build:
    needs: get-run-id
    uses: ./.github/workflows/docker-build.yml
    with:
      AWSRoleToAssume: arn:aws:iam::493272324412:role/github-ecr-role
      ECRRepository: streamlit-ecr-deploy

      dockerImageName: 493272324412.dkr.ecr.us-east-1.amazonaws.com/streamlit-ecr-deploy:${{ github.run_number }}
      buildCommand: docker build -f ./app/Dockerfile -t $IMAGE_URI .
      
      createECR: true
      ecrPolicyFile: policy.json
      AWSRoleDurationSeconds: 900

      outputArtifactPath: scan_results/
      outputArtifactName: scan_results
      outputArtifactRetention: 5
      inputArtifactDownloadName: scan_results

      # 👇 pass run_id into reusable workflows
      run_id: ${{ needs.get-run-id.outputs.run_id }}

    secrets:
      orcaSecurityApiToken: ${{ secrets.ORCA_TOKEN }}
